name: Build and Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Rename and Package Binaries
        shell: bash
        run: |
          mkdir -p assets
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            if [ -f target/release/drc_crawl.exe ]; then
              mv target/release/drc_crawl.exe assets/drc-crawl-windows.exe
            else
              mv target/release/drc-crawl.exe assets/drc-crawl-windows.exe
            fi
          else
            if [ -f target/release/drc_crawl ]; then
              mv target/release/drc_crawl assets/drc-crawl-linux
            else
              mv target/release/drc-crawl assets/drc-crawl-linux
            fi
          fi

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
