<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRC Sitemap | High-Performance Sitemap Generator</title>
    <style>
        :root[data-theme="dark"] {
            --bg-main: #09090b;
            --bg-card: #18181b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #00ff9d;
            --accent-hover: #00cc7d;
            --accent-soft: rgba(0,255,157,0.1);
            --border: #27272a;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --glass: rgba(24,24,27,0.8);
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
            --radius: 12px;
            --transition: 0.25s ease;
        }
        :root[data-theme="light"] {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent: #059669;
            --accent-hover: #047857;
            --accent-soft: rgba(5,150,105,0.08);
            --border: #e2e8f0;
            --danger: #dc2626;
            --success: #059669;
            --warning: #d97706;
            --glass: rgba(255,255,255,0.9);
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --radius: 12px;
            --transition: 0.25s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color var(--transition), border-color var(--transition), color var(--transition); }
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        html[dir="rtl"] body { font-family: 'Vazirmatn', 'Tahoma', 'Segoe UI', sans-serif; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2rem; background: var(--glass);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .brand { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .brand span { color: var(--accent); }
        .controls { display: flex; gap: 10px; align-items: center; }
        button.icon-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 14px; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 0.9rem;
            backdrop-filter: blur(4px);
        }
        button.icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        main { flex: 1; max-width: 1100px; margin: 2rem auto; padding: 0 1rem; width: 100%; }
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 2rem;
            box-shadow: var(--shadow); margin-bottom: 2rem;
            animation: fadeSlideIn 0.4s ease;
        }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card h2 { margin-bottom: 1.8rem; font-size: 1.25rem; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .card h2::before { content: ''; display: inline-block; width: 4px; height: 1.4rem; background: var(--accent); border-radius: 4px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 1.5rem; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 0.9rem 1rem; border-radius: 10px;
            background: var(--bg-main); border: 1px solid var(--border);
            color: var(--text-main); font-size: 1rem; outline: none;
            font-family: inherit;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

        .checkbox-group { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .checkbox-label {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            font-size: 0.9rem; padding: 0.6rem 1.2rem; border: 1px solid var(--border);
            border-radius: 8px; user-select: none; background: var(--bg-main);
        }
        .checkbox-label:hover { border-color: var(--accent); }
        .checkbox-label input { accent-color: var(--accent); width: 16px; height: 16px; }

        button.primary-btn {
            width: 100%; padding: 1rem; border: none; border-radius: 10px;
            background: var(--accent); color: #000; font-size: 1.1rem;
            font-weight: 700; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; transition: transform 0.1s, background 0.3s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(0,255,157,0.25);
        }
        button.primary-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        button.primary-btn:active { transform: scale(0.98); }
        button.primary-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }

        #dashboard, #settingsSection { display: none; }
        .status-box { text-align: center; padding: 2rem; border-radius: var(--radius); border: 1px dashed var(--border); margin-bottom: 2rem; position: relative; }
        .status-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .status-running { color: var(--warning); animation: pulse 2s infinite; }
        .status-completed { color: var(--success); }
        .status-failed { color: var(--danger); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-main); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 800; color: var(--accent); margin-top: 0.5rem; }

        .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 1rem; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s ease; }
        .progress-fill.indeterminate { animation: indeterminate 1.8s infinite; width: 40%; }
        @keyframes indeterminate { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

        .action-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }
        .btn-outline {
            flex: 1; padding: 1rem; text-align: center; border: 1px solid var(--accent);
            color: var(--accent); border-radius: 10px; text-decoration: none; font-weight: 700;
            cursor: pointer; background: transparent; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-outline:hover { background: var(--accent); color: #000; }
        .btn-outline.danger { border-color: var(--danger); color: var(--danger); }
        .btn-outline.danger:hover { background: var(--danger); color: #fff; }

        .config-panel { background: var(--bg-main); padding: 1.2rem; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 1.5rem; font-size: 0.9rem; }
        .config-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
        .config-row:last-child { border-bottom: none; }
        .config-label { color: var(--text-muted); }
        .config-value { font-weight: 600; }

        .toast {
            position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg-card);
            border: 1px solid var(--border); padding: 1rem 1.5rem; border-radius: 12px;
            box-shadow: var(--shadow); display: flex; align-items: center; gap: 1rem;
            transform: translateX(120%); opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease;
            z-index: 999; backdrop-filter: blur(10px);
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.error { border-color: var(--danger); }
        .toast.success { border-color: var(--success); }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 640px) { .settings-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="brand">DRC<span>Sitemap</span></div>
        <div class="controls">
            <button class="icon-btn" id="settingsToggle" onclick="toggleSettings()" data-i18n="settings">⚙️ Settings</button>
            <button class="icon-btn" id="langToggle" onclick="toggleLang()">FA / EN</button>
            <button class="icon-btn" id="themeToggle" onclick="toggleTheme()">☼ / ☾</button>
        </div>
    </header>

    <main>
        <!-- Crawl Config Form -->
        <section id="configSection" class="card">
            <h2 data-i18n="config_title">Engine Configuration</h2>
            <form id="crawlForm" onsubmit="startCrawl(event)">
                <div class="form-group full-width">
                    <label data-i18n="target_url">Target URL (Base Domain)</label>
                    <input type="text" id="url" placeholder="https://example.com" required autofocus>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label data-i18n="max_depth">Max Crawl Depth</label>
                        <input type="number" id="depth" value="3" min="1" max="10" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="concurrency">Concurrency Limit (Threads)</label>
                        <input type="number" id="concurrency" value="20" min="1" max="100" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="max_requests">Max Requests (Optional)</label>
                        <input type="number" id="max_requests" placeholder="e.g. 5000">
                    </div>
                    <div class="form-group">
                        <label data-i18n="timeout">Global Timeout in Seconds (Optional)</label>
                        <input type="number" id="timeout" placeholder="e.g. 600">
                    </div>
                </div>
                <div class="form-group full-width">
                    <label data-i18n="allowed_domains">Allowed Cross-Domains (Comma separated)</label>
                    <input type="text" id="allowed_domains" placeholder="blog.example.com, cdn.example.com">
                </div>
                <div class="form-group full-width">
                    <label data-i18n="blacklist">Blacklist URL Patterns (Comma separated)</label>
                    <input type="text" id="blacklist" placeholder="/admin, /logout, ?cart=">
                </div>
                <div class="form-group full-width">
                    <label data-i18n="content_types">Target Content Types</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" id="track_images"> <span data-i18n="images">Images</span></label>
                        <label class="checkbox-label"><input type="checkbox" id="track_videos"> <span data-i18n="videos">Videos</span></label>
                        <label class="checkbox-label"><input type="checkbox" id="track_documents"> <span data-i18n="docs">Documents (PDF, ZIP)</span></label>
                    </div>
                </div>
                <button type="submit" class="primary-btn" id="startBtn" data-i18n="start_engine">Ignite Engine</button>
            </form>
        </section>

        <!-- Dashboard -->
        <section id="dashboard" class="card">
            <h2 data-i18n="dashboard_title">Live Telemetry</h2>

            <div class="config-panel" id="serverConfig" style="display:none;">
                <div class="config-row"><span class="config-label">Database</span><span class="config-value" id="cfgDb">-</span></div>
                <div class="config-row"><span class="config-label">Sitemap Path</span><span class="config-value" id="cfgSitemap">-</span></div>
                <div class="config-row"><span class="config-label">Schedule</span><span class="config-value" id="cfgSchedule">-</span></div>
                <div class="config-row"><span class="config-label">Expire Days</span><span class="config-value" id="cfgExpire">-</span></div>
            </div>

            <div class="status-box">
                <div id="statusText" class="status-text status-running" data-i18n="status_init">Initializing...</div>
                <div id="targetDisplay" style="color: var(--text-muted); margin-bottom: 10px;"></div>
                <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div data-i18n="links_found">Links Discovered</div>
                    <div class="stat-val" id="statLinks">0</div>
                </div>
                <div class="stat-card">
                    <div data-i18n="time_elapsed">Time Elapsed (ms)</div>
                    <div class="stat-val" id="statTime">0</div>
                </div>
                <div class="stat-card">
                    <div data-i18n="failed_requests">Failed Requests</div>
                    <div class="stat-val" id="statFailed" style="color: var(--danger);">0</div>
                </div>
            </div>

            <div class="action-buttons" id="actionBtns" style="display: none;">
                <button class="btn-outline" onclick="downloadSitemap()">📄 <span data-i18n="download_xml">Download Sitemap XML</span></button>
                <button class="btn-outline" onclick="resetEngine()" style="border-color: var(--text-muted); color: var(--text-main);">🔄 <span data-i18n="new_scan">New Scan</span></button>
            </div>
        </section>

        <!-- Settings Panel -->
        <section id="settingsSection" class="card">
            <h2 data-i18n="settings_title">Server Configuration</h2>
            <form id="settingsForm" onsubmit="updateSettings(event)">
                <div class="settings-grid">
                    <div class="form-group">
                        <label data-i18n="sitemap_path_label">Sitemap Path</label>
                        <input type="text" id="setSitemapPath" placeholder="./sitemap.xml">
                    </div>
                    <div class="form-group">
                        <label data-i18n="schedule_label">Schedule Interval (e.g., 24h, 6h)</label>
                        <input type="text" id="setSchedule" placeholder="empty to disable">
                    </div>
                    <div class="form-group">
                        <label data-i18n="expire_label">Link Expiration (days)</label>
                        <input type="number" id="setExpireDays" value="30" min="1">
                    </div>
                </div>
                <div class="form-group">
                    <button type="submit" class="primary-btn" data-i18n="save_settings">Save Settings</button>
                </div>
            </form>
            <div class="action-buttons" style="margin-top: 1rem;">
                <button class="btn-outline danger" onclick="resetConfig()">🗑️ <span data-i18n="reset_config">Reset Config</span></button>
                <button class="btn-outline danger" onclick="clearDatabase()">🧹 <span data-i18n="clear_db">Clear Database</span></button>
            </div>
        </section>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const dict = {
            en: {
                config_title: "Engine Configuration", target_url: "Target URL (Base Domain)",
                max_depth: "Max Crawl Depth", concurrency: "Concurrency Limit (Threads)",
                max_requests: "Max Requests (Optional)", timeout: "Global Timeout in Secs (Optional)",
                allowed_domains: "Allowed Cross-Domains (Comma separated)", blacklist: "Blacklist URL Patterns (Comma separated)",
                content_types: "Target Content Types", images: "Images", videos: "Videos", docs: "Documents (PDF, ZIP)",
                start_engine: "Ignite Engine", dashboard_title: "Live Telemetry", status_init: "Initializing...",
                status_running: "Engine Running...", status_completed: "Crawl Completed Successfully", status_failed: "Crawl Failed",
                links_found: "Links Discovered", time_elapsed: "Execution Time (ms)", failed_requests: "Failed Requests",
                download_xml: "Download Sitemap XML", new_scan: "Start New Scan",
                settings: "Settings", settings_title: "Server Configuration",
                sitemap_path_label: "Sitemap Path", schedule_label: "Schedule Interval (e.g., 24h, 6h)", expire_label: "Link Expiration (days)",
                save_settings: "Save Settings", reset_config: "Reset Config", clear_db: "Clear Database"
            },
            fa: {
                config_title: "پیکربندی موتور جستجو", target_url: "آدرس سایت (دامنه اصلی)",
                max_depth: "حداکثر عمق نفوذ", concurrency: "تعداد درخواست همزمان (Threads)",
                max_requests: "محدودیت تعداد کل درخواست‌ها", timeout: "تایم‌اوت کل عملیات (ثانیه)",
                allowed_domains: "دامنه‌های مجاز خارجی (با کاما جدا کنید)", blacklist: "لیست سیاه کلمات آدرس (با کاما جدا کنید)",
                content_types: "نوع محتوای هدف", images: "تصاویر", videos: "ویدیوها", docs: "اسناد و فایل‌ها",
                start_engine: "استارت موتور کراولر", dashboard_title: "داشبورد زنده (تله‌متری)", status_init: "در حال راه‌اندازی...",
                status_running: "موتور در حال شخم زدن...", status_completed: "عملیات با موفقیت به پایان رسید", status_failed: "خطا در انجام عملیات",
                links_found: "لینک‌های کشف شده", time_elapsed: "زمان اجرا (میلی‌ثانیه)", failed_requests: "درخواست‌های ناموفق",
                download_xml: "دانلود فایل نقشه سایت", new_scan: "اسکن جدید",
                settings: "تنظیمات", settings_title: "تنظیمات سرور",
                sitemap_path_label: "مسیر Sitemap", schedule_label: "فاصله زمانی (مثلاً 24h, 6h)", expire_label: "انقضای لینک (روز)",
                save_settings: "ذخیره تنظیمات", reset_config: "بازنشانی تنظیمات", clear_db: "پاک‌سازی دیتابیس"
            }
        };

        let currentLang = 'en';
        let currentJobId = null;
        let pollInterval = null;
        let serverConfig = null;

        function toggleTheme() {
            const html = document.documentElement;
            html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', html.dataset.theme);
        }
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'fa' : 'en';
            document.documentElement.dir = currentLang === 'fa' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(dict[currentLang][key]) el.textContent = dict[currentLang][key];
            });
            localStorage.setItem('lang', currentLang);
        }
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => { toast.className = toast.className.replace('show', ''); }, 3500);
        }
        function parseCommaStr(str) {
            if (!str || !str.trim()) return undefined;
            return str.split(',').map(s => s.trim()).filter(s => s.length > 0);
        }

        async function fetchServerConfig() {
            try {
                const res = await fetch('/api/config');
                if (res.ok) {
                    serverConfig = await res.json();
                    document.getElementById('serverConfig').style.display = 'block';
                    document.getElementById('cfgDb').textContent = serverConfig.db_type + ' (' + serverConfig.db_url + ')';
                    document.getElementById('cfgSitemap').textContent = serverConfig.sitemap_path || 'Not set';
                    document.getElementById('cfgSchedule').textContent = serverConfig.schedule_interval || 'Disabled';
                    document.getElementById('cfgExpire').textContent = serverConfig.expire_days || '30';
                    // Also populate settings form if visible
                    if (document.getElementById('settingsSection').style.display === 'block') {
                        document.getElementById('setSitemapPath').value = serverConfig.sitemap_path || '';
                        document.getElementById('setSchedule').value = serverConfig.schedule_interval || '';
                        document.getElementById('setExpireDays').value = serverConfig.expire_days || 30;
                    }
                } else {
                    document.getElementById('serverConfig').style.display = 'none';
                }
            } catch(e) { /* ignore */ }
        }

        function toggleSettings() {
            const ss = document.getElementById('settingsSection');
            if (ss.style.display === 'block') {
                ss.style.display = 'none';
            } else {
                ss.style.display = 'block';
                // load config into form
                if (serverConfig) {
                    document.getElementById('setSitemapPath').value = serverConfig.sitemap_path || '';
                    document.getElementById('setSchedule').value = serverConfig.schedule_interval || '';
                    document.getElementById('setExpireDays').value = serverConfig.expire_days || 30;
                } else {
                    fetchServerConfig();
                }
            }
        }

        async function updateSettings(e) {
            e.preventDefault();
            const payload = {
                sitemap_path: document.getElementById('setSitemapPath').value.trim() || null,
                schedule_interval: document.getElementById('setSchedule').value.trim() || null,
                expire_days: parseInt(document.getElementById('setExpireDays').value) || 30
            };
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    showToast('Settings updated! Some changes may require a restart.', 'success');
                    await fetchServerConfig();
                } else {
                    showToast('Failed to update settings', 'error');
                }
            } catch(e) {
                showToast('Error updating settings', 'error');
            }
        }

        async function resetConfig() {
            if (confirm('Are you sure? This will delete config.json and restart required.')) {
                try {
                    const res = await fetch('/api/config', { method: 'DELETE' });
                    if (res.ok) {
                        showToast('Configuration reset. Restart the server.', 'success');
                    } else {
                        showToast('Error resetting config', 'error');
                    }
                } catch(e) {
                    showToast('Error resetting config', 'error');
                }
            }
        }

        async function clearDatabase() {
            if (confirm('This will permanently delete all crawled links. Continue?')) {
                try {
                    const res = await fetch('/api/database', { method: 'DELETE' });
                    if (res.ok) {
                        showToast('Database cleared.', 'success');
                    } else {
                        showToast('Failed to clear database', 'error');
                    }
                } catch(e) {
                    showToast('Error clearing database', 'error');
                }
            }
        }

        async function startCrawl(e) {
            e.preventDefault();
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Starting...';
            const payload = {
                url: document.getElementById('url').value,
                max_depth: parseInt(document.getElementById('depth').value),
                concurrency_limit: parseInt(document.getElementById('concurrency').value),
                max_total_requests: document.getElementById('max_requests').value ? parseInt(document.getElementById('max_requests').value) : null,
                timeout_seconds: document.getElementById('timeout').value ? parseInt(document.getElementById('timeout').value) : null,
                allowed_domains: parseCommaStr(document.getElementById('allowed_domains').value),
                blacklist_patterns: parseCommaStr(document.getElementById('blacklist').value),
                track_images: document.getElementById('track_images').checked,
                track_videos: document.getElementById('track_videos').checked,
                track_documents: document.getElementById('track_documents').checked,
            };
            try {
                const res = await fetch('/api/crawl/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.job_id) {
                    currentJobId = data.job_id;
                    showDashboard(payload.url);
                    startPolling();
                } else {
                    showToast('Failed to start crawl', 'error');
                    btn.disabled = false;
                    btn.textContent = dict[currentLang]['start_engine'];
                }
            } catch (err) {
                showToast('Error connecting to Engine API!', 'error');
                btn.disabled = false;
                btn.textContent = dict[currentLang]['start_engine'];
            }
        }

        function showDashboard(target) {
            document.getElementById('configSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('targetDisplay').textContent = '🎯 ' + target;
            const pb = document.getElementById('progressBar');
            pb.style.display = 'block';
            const fill = document.getElementById('progressFill');
            fill.className = 'progress-fill indeterminate';
            const stText = document.getElementById('statusText');
            stText.className = 'status-text status-running';
            stText.textContent = dict[currentLang]['status_running'];
            document.getElementById('actionBtns').style.display = 'none';
            document.getElementById('statFailed').textContent = '0';
            fetchServerConfig();
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                if(!currentJobId) return;
                try {
                    const res = await fetch(`/api/crawl/status/${currentJobId}`);
                    if(res.ok) {
                        const data = await res.json();
                        updateDashboardData(data);
                        if (data.status === 'completed' || data.status === 'failed') {
                            clearInterval(pollInterval);
                            finishJob(data.status);
                        }
                    }
                } catch(e) { console.error('Polling error', e); }
            }, 1500);
        }

        function updateDashboardData(data) {
            document.getElementById('statLinks').textContent = data.total_found_links || '0';
            document.getElementById('statTime').textContent = data.total_time_ms || '0';
            document.getElementById('statFailed').textContent = data.failed_requests || '0';
            const fill = document.getElementById('progressFill');
            if (data.status === 'running') {
                fill.className = 'progress-fill indeterminate';
            } else {
                fill.className = 'progress-fill';
                fill.style.width = '100%';
            }
        }

        function finishJob(status) {
            const stText = document.getElementById('statusText');
            document.getElementById('progressBar').style.display = 'none';
            if(status === 'completed') {
                stText.className = 'status-text status-completed';
                stText.textContent = dict[currentLang]['status_completed'];
                document.getElementById('actionBtns').style.display = 'flex';
                showToast('Crawl completed successfully!', 'success');
            } else {
                stText.className = 'status-text status-failed';
                stText.textContent = dict[currentLang]['status_failed'];
                document.getElementById('actionBtns').style.display = 'flex';
                document.querySelector('.action-buttons button:first-child').style.display = 'none';
                showToast('Crawl failed. Check console for details.', 'error');
            }
        }

        function downloadSitemap() {
            if(currentJobId) {
                window.location.href = `/api/crawl/export/${currentJobId}`;
            }
        }

        function resetEngine() {
            currentJobId = null;
            if (pollInterval) clearInterval(pollInterval);
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('configSection').style.display = 'block';
            const btn = document.getElementById('startBtn');
            btn.disabled = false;
            btn.textContent = dict[currentLang]['start_engine'];
            document.getElementById('statLinks').textContent = '0';
            document.getElementById('statTime').textContent = '0';
            document.getElementById('statFailed').textContent = '0';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressFill').className = 'progress-fill';
            document.getElementById('serverConfig').style.display = 'none';
        }

        (function init() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) document.documentElement.dataset.theme = savedTheme;
            const savedLang = localStorage.getItem('lang');
            if (savedLang) currentLang = savedLang;
            toggleLang(); toggleLang();
            // Fetch config initially to have data available for settings
            fetchServerConfig();
        })();
    </script>
</body>
</html>
